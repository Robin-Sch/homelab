services:
    pihole:
        container_name: pihole
        hostname: pihole
        restart: unless-stopped
        image: pihole/pihole:latest
        environment:
            - TZ=Europe/Amsterdam
            - WEBPASSWORD=${PIHOLE_PASS}
            - PIHOLE_DNS_=172.31.1.6#53
        volumes:
            - ./pihole:/etc/pihole/
            - dnsmasq.d:/etc/dnsmasq.d/
        ports:
            - ${IP}:53:53/tcp
            - ${IP}:53:53/udp
        networks:
            dns_net:
                ipv4_address: 172.31.1.5
        depends_on:
            - unbound
        labels:
            - traefik.enable=true
            - traefik.http.routers.pihole.rule=Host(`pihole.${DOMAIN}`)
            - traefik.http.services.pihole.loadbalancer.server.port=80
            - traefik.http.routers.pihole.middlewares=sso-required@file

    unbound:
        container_name: unbound
        restart: unless-stopped
        image: klutchell/unbound:latest
        networks:
            dns_net:
                ipv4_address: 172.31.1.6

volumes:
    dnsmasq.d:

networks:
    dns_net:
        driver: bridge
        ipam:
            config:
                - subnet: 172.31.1.0/16
                  gateway: 172.31.1.1
                  ip_range: 172.31.1.5/30